<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft: PageHeader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-8 font-sans">
  <h1 class="text-xl font-bold mb-1">PageHeader</h1>
  <p class="text-sm text-zinc-500 mb-8">Source: gui/src/components/ui/page-header.tsx</p>

  <!-- Full PageHeader with breadcrumb -->
  <h2 class="text-sm font-medium text-zinc-400 mt-8 mb-3">Full PageHeader (breadcrumb with chevron SVG, title, subtitle, actions)</h2>
  <div class="border-b border-zinc-800 pb-4 mb-6">
    <div class="flex items-center gap-1.5 text-xs text-zinc-500 mb-1">
      <span>Knowledge</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="text-zinc-400">Lessons</span>
    </div>
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-lg font-semibold text-zinc-100">Lessons</h1>
        <p class="text-sm text-zinc-500 mt-0.5">Manage decisions, workarounds, and preferences for your project.</p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button class="rounded-md font-medium transition-colors px-3.5 py-1.5 text-sm bg-transparent border border-zinc-700 text-zinc-300 hover:border-zinc-600 hover:text-zinc-100">Export</button>
        <button class="rounded-md font-medium transition-colors px-3.5 py-1.5 text-sm bg-zinc-100 text-zinc-900 hover:bg-zinc-200">+ New Lesson</button>
      </div>
    </div>
  </div>

  <!-- Minimal PageHeader -->
  <h2 class="text-sm font-medium text-zinc-400 mt-8 mb-3">Minimal PageHeader (title only)</h2>
  <div class="border-b border-zinc-800 pb-4 mb-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-lg font-semibold text-zinc-100">Settings</h1>
      </div>
    </div>
  </div>
</body>
</html>
