<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft: SearchBar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-8 font-sans">
  <h1 class="text-xl font-bold mb-1">SearchBar</h1>
  <p class="text-sm text-zinc-500 mb-8">Source: gui/src/components/ui/search-bar.tsx</p>

  <!-- Default SearchBar -->
  <h2 class="text-sm font-medium text-zinc-400 mt-8 mb-3">Default (empty, with placeholder)</h2>
  <div class="max-w-lg">
    <div class="flex items-center gap-2 px-3 py-2 border border-zinc-800 rounded-lg bg-zinc-900">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 shrink-0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        value=""
        placeholder="Search..."
        class="flex-1 bg-transparent border-none text-sm text-zinc-200 outline-none placeholder:text-zinc-600"
        readonly
      />
    </div>
  </div>

  <!-- With Filter Slot -->
  <h2 class="text-sm font-medium text-zinc-400 mt-8 mb-3">With Filter Slot Button</h2>
  <div class="max-w-lg">
    <div class="flex items-center gap-2 px-3 py-2 border border-zinc-800 rounded-lg bg-zinc-900">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 shrink-0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        value=""
        placeholder="Search lessons..."
        class="flex-1 bg-transparent border-none text-sm text-zinc-200 outline-none placeholder:text-zinc-600"
        readonly
      />
      <button class="rounded-md font-medium transition-colors px-2.5 py-1 text-xs bg-transparent border border-zinc-700 text-zinc-300 hover:border-zinc-600 hover:text-zinc-100">Filters</button>
    </div>
  </div>

  <!-- With Value -->
  <h2 class="text-sm font-medium text-zinc-400 mt-8 mb-3">With Value Entered</h2>
  <div class="max-w-lg">
    <div class="flex items-center gap-2 px-3 py-2 border border-zinc-800 rounded-lg bg-zinc-900">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-zinc-500 shrink-0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        value="drizzle migration"
        class="flex-1 bg-transparent border-none text-sm text-zinc-200 outline-none placeholder:text-zinc-600"
        readonly
      />
      <button class="rounded-md font-medium transition-colors px-2.5 py-1 text-xs bg-transparent border border-zinc-700 text-zinc-300 hover:border-zinc-600 hover:text-zinc-100">Filters</button>
    </div>
  </div>
</body>
</html>
