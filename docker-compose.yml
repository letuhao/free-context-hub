# QC / knowledge loop: start `mcp` + `worker` + `db` (+ `rabbitmq`/`redis` as needed), set QUEUE_ENABLED=true
# and KNOWLEDGE_LOOP_* / QUALITY_EVAL_* / BUILDER_MEMORY_* in `.env`, then run verify — see docs/phase6-verification.md.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: contexthub
      POSTGRES_PASSWORD: contexthub
      POSTGRES_DB: contexthub
    # Loopback-only publish: reachable by host-side dev/QC tooling at
    # localhost:5432 but NOT exposed on the public interface. Containers reach it
    # over the Docker network (service name `db`), independent of this mapping.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - contexthub_pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    # Loopback-only publish (see `db`). Not exposed on the public interface.
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - contexthub_neo4j_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    # Internal-only: app containers reach this over the Docker network
    # (rabbitmq:5672). NOT published to the host — default guest/guest creds must
    # never be on the public interface, and a host-published port is unnecessary.
    # (Also avoids colliding with a host-native RabbitMQ on 5672/15672.)
    expose:
      - "5672"
      - "15672"

  redis:
    image: redis:7-alpine
    # Loopback-only publish (see `db`). Not exposed on the public interface.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - contexthub_redis_data:/data

  # MCP HTTP :3000; repo mounted at /workspace (verify scripts: QC_VERIFY_REPO_ROOT=/workspace).
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        # If you hit "self-signed certificate in certificate chain" during image build,
        # set this to "false" (dev-only) or bake your corporate CA into the image.
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
      # Note: tei-rerank is gated behind `profiles: ["measurement"]` per
      # 12.1h /review-impl MED-2. Not a hard dependency — production runs
      # RERANK_TYPE=generative which doesn't need TEI. Start tei-rerank
      # separately when measuring: `docker compose --profile measurement up -d tei-rerank`.
    env_file:
      - .env
    environment:
      # Inside Compose, reach Postgres via service name.
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      # If you run LM Studio on the host, containers must use host.docker.internal.
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      API_PORT: ${API_PORT:-3001}
      # F2g — the committed base stack is the HARDENED production posture (auth ON +
      # legacy single-shared token disabled = api_keys-only). DEPLOYMENT_PROFILE=production
      # makes src/index.ts run assertEnforceReady() as a hard boot gate (root + system
      # identity, migrations, every credential granted). For local auth-OFF dev run:
      #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
      # Literal values (not ${..}) so a stray MCP_AUTH_ENABLED=false in .env can't
      # silently un-harden the published stack; the dev overlay overrides these.
      DEPLOYMENT_PROFILE: "production"
      MCP_AUTH_ENABLED: "true"
      MCP_LEGACY_TOKEN_DISABLED: "true"
      # CORS allowlist for cross-origin browser access to the REST API. Default
      # empty = same-origin only (the GUI is same-origin via the gateway).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # MCP Host-header allowlist (DNS-rebinding). Includes the gateway's
      # internal service name so proxied /mcp requests (Host: mcp) are accepted.
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,[::1],mcp}
      # Future phase: store index artifacts / caches here.
      INDEX_STORAGE_ROOT: /data/index
      # Future phase (optional): S3-compatible object storage for snapshots/artifacts.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
      # Phase 10.7: enable SSRF bypass + /test-static fixtures ONLY for
      # local dev / E2E. In production leave unset so ingest-url refuses
      # to fetch from private addresses.
      ALLOW_PRIVATE_FETCH_FOR_TESTS: ${ALLOW_PRIVATE_FETCH_FOR_TESTS:-false}
      # Phase 12 salience knobs, exposed for sweep-time overrides.
      # HL default was briefly 30 (Sprint 12.1e2) but reverted to 7 in
      # Sprint 12.1e3 after 2×2 analysis showed the 12.1e2 win was a
      # within-run-write-drift artifact. See src/env.ts docstring for
      # full rationale. NO_WRITE added 12.1e3 for measurement isolation.
      LESSONS_SALIENCE_HALF_LIFE_DAYS: ${LESSONS_SALIENCE_HALF_LIFE_DAYS:-7}
      LESSONS_SALIENCE_ALPHA: ${LESSONS_SALIENCE_ALPHA:-0.10}
      LESSONS_SALIENCE_DISABLED: ${LESSONS_SALIENCE_DISABLED:-false}
      LESSONS_SALIENCE_NO_WRITE: ${LESSONS_SALIENCE_NO_WRITE:-false}
      # 2026-06-17 baseline-stack invariant fix:
      # Phase 17 baseline-stack invariant (CLAUDE.md) says
      # "DISTILLATION_MODEL is unset/empty during baseline (worker no-ops;
      # prevents background swap)." But `.env.baseline` setting these to
      # empty did NOT propagate to containers — `--env-file` only affects
      # compose-substitution; the container's actual env came from
      # `env_file: - .env`. AND the colon-hyphen syntax `${X:-default}`
      # falls back to default whenever X is unset OR empty, so even when
      # substitution worked the empty value was overridden by the default.
      # Both fixed below: explicit `environment:` lines + single-hyphen
      # syntax `${X-default}` (default only when X is UNSET; empty X is
      # honored as empty). Without this fix the worker was running
      # gemma-flavored faq.build / knowledge.loop / raptor.build jobs DURING
      # baseline runs, swapping mistral-nemo out of LM Studio mid-measurement
      # (lmstudio-bug-tracker#945).
      DISTILLATION_MODEL: ${DISTILLATION_MODEL-${CHAT_MODEL-google/gemma-4-26b-a4b-qat}}
      DISTILLATION_ENABLED: ${DISTILLATION_ENABLED-true}
      BUILDER_AGENT_MODEL: ${BUILDER_AGENT_MODEL-}
      QA_AGENT_MODEL: ${QA_AGENT_MODEL-}
      # Sprint 12.1f: expose RERANK_TYPE + RERANK_MODEL for cross-encoder
      # rerank evaluation. Default RERANK_TYPE=generative preserves
      # production (uses DISTILLATION_MODEL). Set RERANK_TYPE=cross-encoder
      # and RERANK_MODEL=<cross-encoder-model> to use embedding-based
      # deterministic rerank instead.
      RERANK_TYPE: ${RERANK_TYPE-generative}
      RERANK_MODEL: ${RERANK_MODEL-}
      # Phase 17.4: chunk hybrid-fusion A/B knob. Unset/weighted = sem+0.30*fts
      # (default); 'rrf' = Reciprocal Rank Fusion. Used to measure RRF vs weighted.
      CHUNKS_FUSION: ${CHUNKS_FUSION-}
      # 2026-06-16: cross-encoder via local-rerank-service (Cohere /v1/rerank).
      RERANK_API_PROTOCOL: ${RERANK_API_PROTOCOL-cohere}
      RERANK_BASE_URL: ${RERANK_BASE_URL-}
      RERANK_API_KEY: ${RERANK_API_KEY-}
    # Single-port gateway model. The host PUBLISH mapping below is loopback-only
    # (127.0.0.1), so the backend is not reachable from the public interface —
    # host-side QC/baseline/smoke tooling can still hit localhost:3000 / :3001.
    # NOTE: the Node process itself listens on 0.0.0.0 INSIDE the container, so
    # it IS reachable by other containers over the Docker network (by design —
    # the `gui` gateway proxies to it). The boundary is therefore: (1) this
    # loopback publish mapping, (2) the gateway's cross-site guard
    # (gui/src/middleware.ts), and (3) backend auth when MCP_AUTH_ENABLED=true.
    # The gateway is NOT an authentication boundary unless auth is enabled —
    # with auth off (default) anyone who can reach the published :3002 can call
    # the full MCP/REST surface. Enable auth + scoped api_keys for any
    # deployment whose gateway port is exposed beyond localhost.
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace
      - D:/Works:/workspaces

  # Builder memory (Phase 6 deep) runs here: needs DISTILLATION_MODEL|BUILDER_AGENT_MODEL + chat-capable /v1/chat/completions in .env.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
    env_file:
      - .env
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      # F2g — hardened production posture (see the mcp service). The worker
      # authenticates as the system-worker principal; worker.ts hard-exits if
      # auth is on without a usable system identity. Dev overlay overrides these.
      DEPLOYMENT_PROFILE: "production"
      MCP_AUTH_ENABLED: "true"
      MCP_LEGACY_TOKEN_DISABLED: "true"
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
      # 2026-06-17 baseline-stack invariant fix — same rationale as the mcp
      # service block above. The worker is the WORST offender for the
      # baseline-stack invariant: faq.build / knowledge.loop / raptor.build
      # jobs continuously hit LM Studio with DISTILLATION_MODEL (gemma)
      # while a baseline runs with mistral-nemo, swapping models mid-run.
      # Single-hyphen syntax + explicit environment lines so .env.baseline
      # can ACTUALLY propagate empty values to the container.
      DISTILLATION_MODEL: ${DISTILLATION_MODEL-${CHAT_MODEL-google/gemma-4-26b-a4b-qat}}
      DISTILLATION_ENABLED: ${DISTILLATION_ENABLED-true}
      BUILDER_AGENT_MODEL: ${BUILDER_AGENT_MODEL-}
      QA_AGENT_MODEL: ${QA_AGENT_MODEL-}
      RERANK_MODEL: ${RERANK_MODEL-}
      RERANK_TYPE: ${RERANK_TYPE-generative}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace
      - D:/Works:/workspaces

  # Next.js GUI — THE single external entrypoint (the gateway).
  # Browser uses same-origin /api and /mcp; this server proxies them to the
  # internal backend (see gui/next.config.ts rewrites). The browser never hits
  # the backend ports directly.
  gui:
    build:
      context: ./gui
      dockerfile: Dockerfile
      args:
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
        # Same-origin by default — no backend hostname baked into the client
        # bundle. Override only to point the browser at a remote backend.
        NEXT_PUBLIC_CONTEXTHUB_API_URL: ${NEXT_PUBLIC_CONTEXTHUB_API_URL:-}
        NEXT_PUBLIC_CONTEXTHUB_TOKEN: ${NEXT_PUBLIC_CONTEXTHUB_TOKEN:-}
        NEXT_PUBLIC_CONTEXTHUB_DEFAULT_PROJECT: ${NEXT_PUBLIC_CONTEXTHUB_DEFAULT_PROJECT:-free-context-hub}
    environment:
      # Runtime proxy targets for the gateway rewrites (server-side only).
      CONTEXTHUB_INTERNAL_API_URL: ${CONTEXTHUB_INTERNAL_API_URL:-http://mcp:3001}
      CONTEXTHUB_INTERNAL_MCP_URL: ${CONTEXTHUB_INTERNAL_MCP_URL:-http://mcp:3000}
      # Cross-site guard (gui/src/middleware.ts): extra origins allowed to call
      # /api and /mcp cross-site. Default empty = same-origin only. Keep in sync
      # with the backend's CORS_ALLOWED_ORIGINS.
      GATEWAY_ALLOWED_ORIGINS: ${GATEWAY_ALLOWED_ORIGINS:-}
      # [DEFERRED-059] The CONTEXTHUB_GATEWAY_TOKEN shim is RETIRED. Under the hardened backend
      # the browser now authenticates with the F-AUTH session cookie (human login), forwarded
      # unchanged by the same-origin proxy — no shared server-side super-credential. Agents still
      # carry their own Bearer api_key. See gui/src/proxy.ts.
    depends_on:
      - mcp
    # The ONE public port. Users and agents both enter here.
    ports:
      - "${GATEWAY_PORT:-${GUI_PORT:-3002}}:3000"

  # MCP server with corporate CA installed into container trust store.
  # Start with: docker compose --profile corp-ca up -d --build db mcp-ca
  mcp-ca:
    profiles: ["corp-ca"]
    build:
      context: .
      dockerfile: Dockerfile
      target: with-ca
      args:
        # With the CA installed, you can keep strict SSL enabled.
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-true}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      # F2g — hardened production posture (see the mcp service); dev overlay overrides.
      DEPLOYMENT_PROFILE: "production"
      MCP_AUTH_ENABLED: "true"
      MCP_LEGACY_TOKEN_DISABLED: "true"
      API_PORT: ${API_PORT:-3001}
      INDEX_STORAGE_ROOT: /data/index
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
    # F2g — loopback-only publish, matching the main `mcp` service. The backend must
    # NOT be reachable from the public interface; the gateway (:3002) is the sole entrypoint.
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace:ro

  # Phase 12 Sprint 12.1g / 12.1h — HuggingFace text-embeddings-inference (TEI)
  # for true cross-encoder rerank. Supports /rerank endpoint with
  # (query, texts) pair scoring — unblocks bge-reranker, ms-marco-MiniLM,
  # and other cross-encoders that return garbage via LM Studio's
  # /v1/embeddings. CPU-only to avoid VRAM contention with LM Studio.
  #
  # PROFILE: 'measurement'. Opt-in service, not started by default. Used
  # when running QC baselines with RERANK_TYPE=api. To start:
  #     docker compose --profile measurement up -d tei-rerank
  # Production defaults (RERANK_TYPE=generative) do not need this service.
  #
  # Model: currently ms-marco-MiniLM-L-6-v2 (80MB, classic cross-encoder,
  # fastest option found in Sprint 12.1h). Swap via --model-id arg to test
  # another model; must be TEI-compatible (needs `model_type` in config.json
  # — 12.1h found jina-reranker-v2 incompatible for this reason).
  #
  # Disk cost: bge (560MB) + minilm (80MB) + partial jina (~200MB)
  # remain in the named volume from prior sprints — total ~840MB in
  # `tei_model_cache`. Prune with `docker volume rm free-context-hub_tei_model_cache`
  # if reclaiming space.
  tei-rerank:
    profiles: ["measurement"]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "cross-encoder/ms-marco-MiniLM-L-6-v2"]
    volumes:
      - tei_model_cache:/data
    ports:
      - "127.0.0.1:8080:80"  # loopback dev/debug expose; mcp reaches via docker network at http://tei-rerank:80
    healthcheck:
      # TEI image has `curl` but NOT `wget` (12.1h /review-impl finding).
      test: ["CMD-SHELL", "curl --fail --silent --max-time 3 http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s  # first run downloads model — up to ~4min
    restart: unless-stopped

  # Phase 16 Sprint 16.2 — RAG gen-eval judge sidecar (FastAPI + ragas).
  # Stateless service; reaches LM Studio on the host via host.docker.internal:1234.
  # Opt-in via profile to avoid weighing down regular `docker compose up`.
  # Start with: docker compose --profile measurement up -d ragas-judge
  ragas-judge:
    profiles: ["measurement"]
    build:
      context: ./services/ragas-judge
      dockerfile: Dockerfile
    environment:
      # Defaults assume LM Studio on the host with Gemma-4-26B-A4B + bge-m3 embeddings.
      # Override any of these via .env or `docker compose --env-file ...`.
      # 2026-06-17 baseline-stack invariant fix — single-hyphen syntax
      # `${X-default}` so .env.baseline's explicit empty/override values
      # PROPAGATE to the container, not get masked by the default. The old
      # colon-hyphen `${X:-default}` made `.env.baseline JUDGE_AGENT_MODEL=`
      # silently revert to gemma — the bug at the heart of the model-swap
      # contamination CLAUDE.md warned about.
      JUDGE_AGENT_BASE_URL: ${JUDGE_AGENT_BASE_URL-http://host.docker.internal:1234/v1}
      JUDGE_AGENT_API_KEY: ${JUDGE_AGENT_API_KEY-lm-studio}
      # Single source of truth: judge defaults to the canonical CHAT_MODEL so it
      # SHARES the loaded chat instance (no LM Studio swap). Set CHAT_MODEL in
      # .env once; override JUDGE_AGENT_MODEL only for a deliberate cross-judge run.
      JUDGE_AGENT_MODEL: ${JUDGE_AGENT_MODEL-${CHAT_MODEL-google/gemma-4-26b-a4b-qat}}
      JUDGE_TEMPERATURE: ${JUDGE_TEMPERATURE-0.0}
      JUDGE_SEED: ${JUDGE_SEED-42}
      JUDGE_TIMEOUT_S: ${JUDGE_TIMEOUT_S-60}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL-http://host.docker.internal:1234/v1}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY-lm-studio}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL-text-embedding-bge-m3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Phase 17.x — disable ragas analytics. Ragas POSTs to t.explodinggradients.com
      # after every metric/embedding call. From inside the Docker container,
      # outbound DNS resolution for that hostname fails and each call waits
      # ~8 seconds for the timeout/retry budget. Adds tens of seconds per
      # baseline row when answer_relevancy (which needs embeddings) runs.
      # See: https://github.com/explodinggradients/ragas (telemetry section)
      RAGAS_DO_NOT_TRACK: "true"
    ports:
      - "127.0.0.1:3005:8000"  # loopback-only; measurement sidecar
    # host.docker.internal already resolved on Docker Desktop (Win/Mac);
    # on Linux it requires this extra_hosts entry.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Phase 17.3 — NLI fact-checking judge. Scores answer claims vs contexts with a
  # cross-encoder NLI model (entailment/contradiction/neutral). Self-contained —
  # NO LM Studio dependency (model baked into the image at build). Measurement
  # profile only. Start with: docker compose --profile measurement up -d nli-judge
  nli-judge:
    profiles: ["measurement"]
    build:
      context: ./services/nli-judge
      dockerfile: Dockerfile
      args:
        # Bake a different NLI model by overriding this at build time.
        NLI_MODEL: ${NLI_MODEL-cross-encoder/nli-deberta-v3-small}
    environment:
      NLI_MODEL: ${NLI_MODEL-cross-encoder/nli-deberta-v3-small}
      NLI_MAX_LENGTH: ${NLI_MAX_LENGTH-512}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3006:8000"  # loopback-only; measurement sidecar
    restart: unless-stopped

  # Optional S3-compatible storage (MinIO) for future indexing phases.
  # Start with: docker compose --profile s3 up -d
  minio:
    image: minio/minio:latest
    #profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    # Loopback-only publish (see `db`). Default minioadmin creds must never be
    # reachable from the public interface.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - contexthub_minio_data:/data

volumes:
  contexthub_pgdata:
  contexthub_neo4j_data:
  contexthub_mcpdata:
  contexthub_minio_data:
  contexthub_redis_data:
  tei_model_cache:   # Sprint 12.1g — bge-reranker-v2-m3 (~560MB) cached here

