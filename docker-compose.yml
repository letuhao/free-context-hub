services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: contexthub
      POSTGRES_PASSWORD: contexthub
      POSTGRES_DB: contexthub
    ports:
      - "5432:5432"
    volumes:
      - contexthub_pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - contexthub_neo4j_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - contexthub_redis_data:/data

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        # If you hit "self-signed certificate in certificate chain" during image build,
        # set this to "false" (dev-only) or bake your corporate CA into the image.
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
    env_file:
      - .env
    environment:
      # Inside Compose, reach Postgres via service name.
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      # If you run LM Studio on the host, containers must use host.docker.internal.
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      # Future phase: store index artifacts / caches here.
      INDEX_STORAGE_ROOT: /data/index
      # Future phase (optional): S3-compatible object storage for snapshots/artifacts.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-false}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
    env_file:
      - .env
    command: npm run worker
    environment:
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace

  # MCP server with corporate CA installed into container trust store.
  # Start with: docker compose --profile corp-ca up -d --build db mcp-ca
  mcp-ca:
    profiles: ["corp-ca"]
    build:
      context: .
      dockerfile: Dockerfile
      target: with-ca
      args:
        # With the CA installed, you can keep strict SSL enabled.
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-true}
    depends_on:
      - db
      - neo4j
      - rabbitmq
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://contexthub:contexthub@db:5432/contexthub
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://host.docker.internal:1234}
      MCP_PORT: ${MCP_PORT:-3000}
      INDEX_STORAGE_ROOT: /data/index
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-false}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-postgres}
      JOB_QUEUE_NAME: ${JOB_QUEUE_NAME:-default}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-contexthub.jobs}
      REPO_CACHE_ROOT: ${REPO_CACHE_ROOT:-/data/repos}
      SOURCE_STORAGE_MODE: ${SOURCE_STORAGE_MODE:-local}
      WORKSPACE_SCAN_ENABLED: ${WORKSPACE_SCAN_ENABLED:-false}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-contexthub}
      REDIS_RETRIEVAL_TTL_SECONDS: ${REDIS_RETRIEVAL_TTL_SECONDS:-900}
      REDIS_RERANK_TTL_SECONDS: ${REDIS_RERANK_TTL_SECONDS:-7200}
    ports:
      - "3000:3000"
    volumes:
      - contexthub_mcpdata:/data
      - ./:/workspace:ro

  # Optional S3-compatible storage (MinIO) for future indexing phases.
  # Start with: docker compose --profile s3 up -d
  minio:
    image: minio/minio:latest
    #profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - contexthub_minio_data:/data

volumes:
  contexthub_pgdata:
  contexthub_neo4j_data:
  contexthub_mcpdata:
  contexthub_minio_data:
  contexthub_redis_data:

